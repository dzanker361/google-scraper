<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SERP Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #1d2021;
      --bg1:       #282828;
      --bg2:       #3c3836;
      --bg3:       #504945;
      --fg:        #ebdbb2;
      --fg2:       #d5c4a1;
      --fg3:       #bdae93;
      --yellow:    #d79921;
      --yellow-b:  #fabd2f;
      --green:     #98971a;
      --green-b:   #b8bb26;
      --red:       #cc241d;
      --red-b:     #fb4934;
      --blue:      #458588;
      --blue-b:    #83a598;
      --orange:    #d65d0e;
      --orange-b:  #fe8019;
      --aqua:      #689d6a;
      --aqua-b:    #8ec07c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      /* subtle scanline texture */
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.08) 3px,
        rgba(0,0,0,.08) 4px
      );
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 860px;
      margin-bottom: 2.5rem;
    }
    .logo {
      display: flex;
      align-items: baseline;
      gap: .5rem;
      margin-bottom: .4rem;
    }
    .logo-bracket { color: var(--bg3); font-weight: 700; font-size: 1.6rem; }
    .logo-text    { font-size: 1.6rem; font-weight: 700; color: var(--yellow-b); letter-spacing: -.5px; }
    .logo-cursor  {
      display: inline-block;
      width: 12px; height: 1.3rem;
      background: var(--green-b);
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .tagline { color: var(--fg3); font-size: .8rem; }
    .tagline span { color: var(--aqua-b); }

    /* ── Search box ── */
    .search-wrap {
      width: 100%;
      max-width: 860px;
      background: var(--bg1);
      border: 1px solid var(--bg3);
      border-radius: 4px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.2rem;
      position: relative;
    }
    .search-wrap::before {
      content: '$ serp-scraper --query';
      position: absolute;
      top: -1px; left: 0;
      background: var(--bg3);
      color: var(--fg3);
      font-size: .7rem;
      padding: 1px 8px;
      border-radius: 4px 0 4px 0;
    }

    .input-row {
      display: flex;
      gap: .8rem;
      margin-top: .4rem;
    }

    #query {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--bg3);
      border-radius: 3px;
      color: var(--green-b);
      font-family: inherit;
      font-size: 1rem;
      padding: .55rem .9rem;
      outline: none;
      transition: border-color .2s;
      caret-color: var(--green-b);
    }
    #query::placeholder { color: var(--bg3); }
    #query:focus { border-color: var(--yellow); box-shadow: 0 0 0 2px rgba(215,153,33,.15); }

    .btn {
      cursor: pointer;
      border: none;
      border-radius: 3px;
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      padding: .55rem 1.3rem;
      transition: filter .15s, transform .1s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--yellow);
      color: var(--bg);
    }
    .btn-primary:hover { filter: brightness(1.15); }
    .btn-secondary {
      background: var(--bg2);
      color: var(--fg2);
      border: 1px solid var(--bg3);
    }
    .btn-secondary:hover { filter: brightness(1.2); }
    .btn-secondary:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Controls ── */
    .controls {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      gap: .7rem;
      margin-bottom: 1.4rem;
      flex-wrap: wrap;
    }
    .controls label { color: var(--fg3); font-size: .78rem; }
    .controls select, .controls input[type=number] {
      background: var(--bg1);
      border: 1px solid var(--bg3);
      border-radius: 3px;
      color: var(--fg);
      font-family: inherit;
      font-size: .8rem;
      padding: .3rem .6rem;
    }
    .sep { flex: 1; }

    /* ── Status bar ── */
    #status {
      width: 100%;
      max-width: 860px;
      font-size: .78rem;
      color: var(--fg3);
      min-height: 1.4rem;
      margin-bottom: .8rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    #status.loading { color: var(--yellow-b); }
    #status.error   { color: var(--red-b); }
    #status.ok      { color: var(--green-b); }
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--yellow);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results {
      width: 100%;
      max-width: 860px;
    }

    .result-card {
      background: var(--bg1);
      border: 1px solid var(--bg2);
      border-left: 3px solid var(--blue);
      border-radius: 3px;
      padding: .9rem 1.1rem;
      margin-bottom: .75rem;
      animation: slide-in .25s ease both;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-card:nth-child(2)  { animation-delay: .04s; }
    .result-card:nth-child(3)  { animation-delay: .08s; }
    .result-card:nth-child(4)  { animation-delay: .12s; }
    .result-card:nth-child(5)  { animation-delay: .16s; }
    .result-card:nth-child(6)  { animation-delay: .20s; }
    .result-card:nth-child(7)  { animation-delay: .24s; }
    .result-card:nth-child(8)  { animation-delay: .28s; }
    .result-card:nth-child(9)  { animation-delay: .32s; }
    .result-card:nth-child(10) { animation-delay: .36s; }

    .result-pos {
      font-size: .7rem;
      color: var(--blue-b);
      font-weight: 700;
      margin-bottom: .3rem;
    }
    .result-title {
      color: var(--yellow-b);
      font-size: .95rem;
      font-weight: 600;
      text-decoration: none;
      display: block;
      margin-bottom: .2rem;
      word-break: break-word;
    }
    .result-title:hover { color: var(--orange-b); text-decoration: underline; }
    .result-url {
      color: var(--green);
      font-size: .72rem;
      margin-bottom: .35rem;
      word-break: break-all;
    }
    .result-desc {
      color: var(--fg2);
      font-size: .8rem;
      line-height: 1.55;
    }

    /* ── Empty / error state ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--bg3);
    }
    .empty-state pre {
      font-size: .8rem;
      line-height: 1.5;
      color: var(--bg3);
    }

    /* ── Export banner ── */
    #export-bar {
      display: none;
      width: 100%;
      max-width: 860px;
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: 3px;
      padding: .6rem 1rem;
      margin-bottom: .8rem;
      align-items: center;
      gap: .8rem;
      font-size: .78rem;
      color: var(--fg3);
      flex-wrap: wrap;
    }
    #export-bar.visible { display: flex; }
    #export-bar strong { color: var(--fg); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-bracket">[</span>
    <span class="logo-text">SERP Scraper</span>
    <span class="logo-bracket">]</span>
    <span class="logo-cursor"></span>
  </div>
  <p class="tagline">Google organic results → <span>JSON / CSV</span> &nbsp;|&nbsp; strana 1, pouze přirozené výsledky</p>
</header>

<div class="search-wrap">
  <div class="input-row">
    <input
      id="query"
      type="text"
      placeholder="např. &quot;nejlepší coffee shop Praha&quot;"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="btn btn-primary" id="btn-search" onclick="doSearch()">Hledat</button>
  </div>
</div>

<div class="controls">
  <label>Jazyk výsledků:</label>
  <select id="hl">
    <option value="cs">🇨🇿 cs</option>
    <option value="en">🇬🇧 en</option>
    <option value="sk">🇸🇰 sk</option>
  </select>

  <label>Země:</label>
  <select id="gl">
    <option value="cz">CZ</option>
    <option value="us">US</option>
    <option value="sk">SK</option>
  </select>

  <span class="sep"></span>

  <button class="btn btn-secondary" id="btn-json" disabled onclick="downloadResults('json')">⬇ JSON</button>
  <button class="btn btn-secondary" id="btn-csv"  disabled onclick="downloadResults('csv')">⬇ CSV</button>
</div>

<div id="export-bar">
  <strong id="export-count"></strong>
  &nbsp;výsledků nalezeno pro&nbsp;<em id="export-query"></em>
</div>

<div id="status"></div>
<div id="results"></div>

<script>
  let lastResults = null;
  let lastQuery   = '';

  const $ = id => document.getElementById(id);

  function setStatus(msg, cls = '') {
    const el = $('status');
    el.className = cls;
    el.innerHTML = cls === 'loading'
      ? `<span class="spinner"></span> ${msg}`
      : msg;
  }

  function renderResults(data) {
    const container = $('results');
    container.innerHTML = '';

    if (!data.results || data.results.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <pre>
  ┌─────────────────────────────────┐
  │  Žádné organické výsledky       │
  │  Google mohl vrátit captchu     │
  │  nebo query nenašlo výsledky.   │
  └─────────────────────────────────┘
          </pre>
        </div>`;
      return;
    }

    data.results.forEach(r => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="result-pos">#${r.position}</div>
        <a class="result-title" href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a>
        <div class="result-url">${esc(r.displayUrl || r.url)}</div>
        <div class="result-desc">${esc(r.description)}</div>
      `;
      container.appendChild(card);
    });
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  async function doSearch() {
    const q  = $('query').value.trim();
    const hl = $('hl').value;
    const gl = $('gl').value;

    if (!q) { $('query').focus(); return; }

    $('btn-search').disabled = true;
    $('btn-json').disabled   = true;
    $('btn-csv').disabled    = true;
    $('export-bar').className = '';
    setStatus('Stahuji výsledky z Google…', 'loading');

    try {
      const url = `/api/search?q=${encodeURIComponent(q)}&hl=${hl}&gl=${gl}&format=json`;
      const res = await fetch(url);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const data = await res.json();
      lastResults = data;
      lastQuery   = q;

      renderResults(data);

      const n = data.results?.length ?? 0;
      setStatus(`✓ ${n} organických výsledků`, 'ok');

      $('export-count').textContent = n;
      $('export-query').textContent = `"${q}"`;
      $('export-bar').className = 'visible';

      $('btn-json').disabled = false;
      $('btn-csv').disabled  = false;
    } catch (e) {
      setStatus(`✗ Chyba: ${e.message}`, 'error');
      $('results').innerHTML = '';
    } finally {
      $('btn-search').disabled = false;
    }
  }

  async function downloadResults(format) {
    if (!lastQuery) return;
    const hl = $('hl').value;
    const gl = $('gl').value;
    const url = `/api/search?q=${encodeURIComponent(lastQuery)}&hl=${hl}&gl=${gl}&format=${format}`;
    const a = document.createElement('a');
    a.href = url;
    a.download = `serp-${lastQuery.replace(/\s+/g, '-')}.${format}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // Enter to search
  $('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
