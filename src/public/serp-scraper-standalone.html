<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SERP Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #1d2021; --bg1: #282828; --bg2: #3c3836; --bg3: #504945;
      --fg:      #ebdbb2; --fg2: #d5c4a1; --fg3: #bdae93;
      --yellow:  #d79921; --yellowb: #fabd2f;
      --green:   #98971a; --greenb:  #b8bb26;
      --redb:    #fb4934; --blue: #458588; --blueb: #83a598;
      --orangeb: #fe8019; --aquab: #8ec07c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; line-height: 1.6; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 3rem 1.5rem 5rem;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px);
    }

    header { width: 100%; max-width: 820px; margin-bottom: 2rem; }
    .logo  { display: flex; align-items: baseline; gap: .5rem; margin-bottom: .3rem; }
    .logo-bracket { color: var(--bg3); font-weight: 700; font-size: 1.5rem; }
    .logo-text    { font-size: 1.5rem; font-weight: 700; color: var(--yellowb); }
    .logo-cursor  {
      display: inline-block; width: 11px; height: 1.2rem;
      background: var(--greenb); vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .tagline { color: var(--fg3); font-size: .78rem; }
    .tagline span { color: var(--aquab); }

    .panel {
      width: 100%; max-width: 820px;
      background: var(--bg1); border: 1px solid var(--bg3);
      border-radius: 4px; padding: 1.1rem 1.3rem;
      margin-bottom: 1rem; position: relative;
    }
    .panel-label {
      position: absolute; top: -1px; left: 0;
      background: var(--bg3); color: var(--fg3);
      font-size: .67rem; padding: 1px 8px; border-radius: 4px 0 4px 0;
    }
    .panel-body { margin-top: .5rem; }

    .cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; margin-bottom: .6rem; }
    @media(max-width:560px){ .cfg-grid { grid-template-columns: 1fr; } }

    .field-label { font-size: .7rem; color: var(--fg3); margin-bottom: .25rem; }

    input[type=text], input[type=password] {
      width: 100%;
      background: var(--bg); border: 1px solid var(--bg3); border-radius: 3px;
      color: var(--yellowb); font-family: inherit; font-size: .88rem;
      padding: .48rem .75rem; outline: none; transition: border-color .2s;
    }
    input[type=text]:focus, input[type=password]:focus { border-color: var(--yellow); }
    input::placeholder { color: var(--bg3); }

    .cfg-hint { font-size: .7rem; color: var(--fg3); line-height: 1.6; }
    .cfg-hint a { color: var(--blueb); }
    .cfg-saved { display:none; font-size:.7rem; color:var(--greenb); margin-top:.4rem; }

    .search-row { display: flex; gap: .7rem; margin-top: .4rem; }
    #query {
      flex: 1;
      background: var(--bg); border: 1px solid var(--bg3); border-radius: 3px;
      color: var(--greenb); font-family: inherit; font-size: 1rem;
      padding: .52rem .85rem; outline: none; caret-color: var(--greenb);
      transition: border-color .2s;
    }
    #query:focus { border-color: var(--yellow); box-shadow: 0 0 0 2px rgba(215,153,33,.13); }
    #query::placeholder { color: var(--bg3); }

    .btn {
      cursor: pointer; border: none; border-radius: 3px;
      font-family: inherit; font-size: .83rem; font-weight: 600;
      padding: .52rem 1.2rem; transition: filter .15s, transform .1s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary  { background: var(--yellow); color: var(--bg); }
    .btn-primary:hover { filter: brightness(1.15); }
    .btn-secondary { background: var(--bg2); color: var(--fg2); border: 1px solid var(--bg3); }
    .btn-secondary:hover:not(:disabled) { filter: brightness(1.2); }
    .btn-secondary:disabled { opacity: .32; cursor: not-allowed; }

    .controls {
      width: 100%; max-width: 820px;
      display: flex; align-items: center; gap: .7rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .controls label { color: var(--fg3); font-size: .76rem; }
    .controls select {
      background: var(--bg1); border: 1px solid var(--bg3); border-radius: 3px;
      color: var(--fg); font-family: inherit; font-size: .78rem;
      padding: .28rem .55rem; outline: none;
    }
    .sep { flex: 1; }

    #status {
      width: 100%; max-width: 820px;
      font-size: .76rem; min-height: 1.3rem; margin-bottom: .6rem;
      display: flex; align-items: center; gap: .5rem;
    }
    #status.loading { color: var(--yellowb); }
    #status.error   { color: var(--redb); }
    #status.ok      { color: var(--greenb); }
    .spinner {
      display: inline-block; width: 9px; height: 9px;
      border: 2px solid var(--yellow); border-top-color: transparent;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #export-bar {
      display: none; width: 100%; max-width: 820px;
      background: var(--bg2); border: 1px solid var(--bg3); border-radius: 3px;
      padding: .5rem .9rem; margin-bottom: .7rem;
      align-items: center; gap: .7rem; font-size: .76rem; color: var(--fg3);
    }
    #export-bar.visible { display: flex; }
    #export-bar strong { color: var(--fg); }

    #results { width: 100%; max-width: 820px; }
    .result-card {
      background: var(--bg1); border: 1px solid var(--bg2);
      border-left: 3px solid var(--blue); border-radius: 3px;
      padding: .85rem 1rem; margin-bottom: .65rem;
      animation: slidein .22s ease both;
    }
    @keyframes slidein { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
    .result-card:nth-child(2){animation-delay:.04s} .result-card:nth-child(3){animation-delay:.08s}
    .result-card:nth-child(4){animation-delay:.12s} .result-card:nth-child(5){animation-delay:.16s}
    .result-card:nth-child(6){animation-delay:.20s} .result-card:nth-child(7){animation-delay:.24s}
    .result-card:nth-child(8){animation-delay:.28s} .result-card:nth-child(9){animation-delay:.32s}
    .result-card:nth-child(10){animation-delay:.36s}
    .result-pos   { font-size:.68rem; color:var(--blueb); font-weight:700; margin-bottom:.25rem; }
    .result-title { color:var(--yellowb); font-size:.92rem; font-weight:600; text-decoration:none; display:block; margin-bottom:.18rem; word-break:break-word; }
    .result-title:hover { color:var(--orangeb); text-decoration:underline; }
    .result-url   { color:var(--green); font-size:.7rem; margin-bottom:.3rem; word-break:break-all; }
    .result-desc  { color:var(--fg2); font-size:.78rem; line-height:1.55; }
    .empty-state  { text-align:center; padding:2.5rem 1rem; }
    .empty-state pre { font-size:.78rem; line-height:1.6; color:var(--bg3); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-bracket">[</span>
    <span class="logo-text">SERP Scraper</span>
    <span class="logo-bracket">]</span>
    <span class="logo-cursor"></span>
  </div>
  <p class="tagline">Google organic results → <span>JSON / CSV</span> &nbsp;|&nbsp; volá localhost:3000</p>
</header>

<!-- ── Konfigurace ── -->
<div class="panel">
  <span class="panel-label">$ config --server</span>
  <div class="panel-body">
    <div style="display:flex;gap:.7rem;align-items:center;">
      <div style="flex:1">
        <div class="field-label">URL backendu</div>
        <input id="cfg-url" type="text" value="http://localhost:3000" autocomplete="off" spellcheck="false"/>
      </div>
      <button class="btn btn-primary" style="margin-top:1.1rem" onclick="saveConfig()">Uložit</button>
      <div class="cfg-saved" id="cfg-saved" style="margin-top:1.1rem">✓ Uloženo</div>
    </div>
    <div class="cfg-hint" style="margin-top:.6rem">
      Spusť backend: <strong>cd google-scraper &amp;&amp; npm start</strong>
      &nbsp;→&nbsp; pak tady hledej. Server musí běžet na pozadí.
    </div>
  </div>
</div>

<!-- ── Hledání ── -->
<div class="panel">
  <span class="panel-label">$ serp-scraper --query</span>
  <div class="panel-body">
    <div class="search-row">
      <input id="query" type="text" placeholder='např. "nejlepší coffee shop Praha"' autocomplete="off" spellcheck="false"/>
      <button class="btn btn-primary" id="btn-search" onclick="doSearch()">Hledat</button>
    </div>
  </div>
</div>

<!-- ── Ovládání + export ── -->
<div class="controls">
  <label>Jazyk:</label>
  <select id="hl">
    <option value="cs">🇨🇿 cs</option>
    <option value="en">🇬🇧 en</option>
    <option value="sk">🇸🇰 sk</option>
  </select>
  <label>Země:</label>
  <select id="gl">
    <option value="cz">CZ</option>
    <option value="us">US</option>
    <option value="sk">SK</option>
  </select>
  <span class="sep"></span>
  <button class="btn btn-secondary" id="btn-json" disabled onclick="exportFile('json')">⬇ JSON</button>
  <button class="btn btn-secondary" id="btn-csv"  disabled onclick="exportFile('csv')">⬇ CSV</button>
</div>

<div id="export-bar">
  <strong id="exp-count"></strong>&nbsp;výsledků pro&nbsp;<em id="exp-query"></em>
</div>
<div id="status"></div>
<div id="results"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let serverUrl   = sessionStorage.getItem('server_url') || 'http://localhost:3000';
  let lastResults = null;
  let lastQuery   = '';

  const el = id => document.getElementById(id);

  el('cfg-url').value = serverUrl;

  // ── Config ─────────────────────────────────────────────────────────────────
  function saveConfig() {
    const u = el('cfg-url').value.trim().replace(/\/$/, '');
    if (!u) { setStatus('✗ Zadej URL serveru', 'error'); return; }
    serverUrl = u;
    sessionStorage.setItem('server_url', u);
    showSaved();
    setStatus('');
  }

  function showSaved() {
    el('cfg-saved').style.display = 'inline';
  }

  // ── Status ─────────────────────────────────────────────────────────────────
  function setStatus(msg, cls = '') {
    const s = el('status');
    s.className = cls;
    s.innerHTML = cls === 'loading' ? `<span class="spinner"></span> ${msg}` : msg;
  }

  // ── XSS escape ─────────────────────────────────────────────────────────────
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = String(str ?? '');
    return d.innerHTML;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderResults(results) {
    const c = el('results');
    c.innerHTML = '';
    if (!results || results.length === 0) {
      c.innerHTML = `<div class="empty-state"><pre>
  ┌──────────────────────────────────┐
  │  Žádné výsledky.                 │
  │  Zkus jiný dotaz nebo jazyk.     │
  └──────────────────────────────────┘</pre></div>`;
      return;
    }
    results.forEach(r => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="result-pos">#${r.position}</div>
        <a class="result-title" href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a>
        <div class="result-url">${esc(r.displayUrl)}</div>
        <div class="result-desc">${esc(r.description)}</div>`;
      c.appendChild(card);
    });
  }

  // ── Search ─────────────────────────────────────────────────────────────────
  async function doSearch() {
    const q  = el('query').value.trim();
    const hl = el('hl').value;
    const gl = el('gl').value;

    if (!q) { el('query').focus(); return; }

    el('btn-search').disabled = true;
    el('btn-json').disabled   = true;
    el('btn-csv').disabled    = true;
    el('export-bar').className = '';
    setStatus('Stahuji výsledky z Google…', 'loading');

    try {
      const params = new URLSearchParams({ q, hl, gl, format: 'json' });
      const res = await fetch(`${serverUrl}/api/search?${params}`);

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const results = data.results || [];

      lastResults = results;
      lastQuery   = q;

      renderResults(results);
      setStatus(`✓ ${results.length} organických výsledků`, 'ok');
      el('exp-count').textContent = results.length;
      el('exp-query').textContent = `"${q}"`;
      el('export-bar').className  = 'visible';
      el('btn-json').disabled = false;
      el('btn-csv').disabled  = false;

    } catch (err) {
      const msg = err.message.includes('Failed to fetch')
        ? 'Backend neběží — spusť: cd google-scraper && npm start'
        : err.message;
      setStatus(`✗ ${msg}`, 'error');
      el('results').innerHTML = '';
    } finally {
      el('btn-search').disabled = false;
    }
  }

  // ── Export ─────────────────────────────────────────────────────────────────
  function toJson(results) {
    return JSON.stringify({ query: lastQuery, timestamp: new Date().toISOString(), results }, null, 2);
  }

  function toCsv(results) {
    const headers = ['position', 'title', 'url', 'displayUrl', 'description'];
    const escape  = v => {
      const s = String(v ?? '').replace(/"/g, '""');
      return s.includes(',') || s.includes('\n') || s.includes('"') ? `"${s}"` : s;
    };
    return [headers.join(','), ...results.map(r => headers.map(h => escape(r[h])).join(','))].join('\n');
  }

  function exportFile(format) {
    if (!lastResults) return;
    const content  = format === 'csv' ? toCsv(lastResults) : toJson(lastResults);
    const mimeType = format === 'csv' ? 'text/csv' : 'application/json';
    const blob = new Blob([content], { type: mimeType + ';charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `serp-${lastQuery.replace(/\s+/g,'-')}.${format}`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  // ── Enter shortcuts ────────────────────────────────────────────────────────
  el('query').addEventListener('keydown',   e => { if (e.key === 'Enter') doSearch(); });
  el('cfg-url').addEventListener('keydown', e => { if (e.key === 'Enter') saveConfig(); });
</script>
</body>
</html>
